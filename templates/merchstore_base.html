<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Merchstore{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'merchstore:item_list' %}">Products</a>
            {% if user.is_authenticated %}
                <a href="{% url 'merchstore:cart' %}">Cart</a>
                <a href="{% url 'merchstore:transactions' %}">Transactions</a>
                <a href="{% url 'accounts:profile_update' user.username %}">Profile</a>
            {% else %}
                <a href="{% url 'login' %}">Log in</a>
                <a href="{% url 'accounts:register' %}">Register</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>

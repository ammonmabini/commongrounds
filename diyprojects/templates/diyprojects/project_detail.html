<!DOCTYPE html>
<html>
<head>
    <title>{{ project.title }}</title>
</head>

<body>

<h1>{{ project.title }}</h1>

{% if project.category %}
<p><strong>Category:</strong> {{ project.category.name }}</p>
{% endif %}

<h3>Description</h3>
<p>{{ project.description }}</p>

<h3>Materials</h3>
<p>{{ project.materials }}</p>

<h3>Steps</h3>
<p>{{ project.steps }}</p>

<p><strong>Created:</strong> {{ project.created_on }}</p>
<p><strong>Updated:</strong> {{ project.updated_on }}</p>

<p>
    <a href="{% url 'diyprojects:project-list' %}">Back to list</a>
</p>

</body>
</html>
